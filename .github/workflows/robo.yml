name: Atualizador de Cupões Diário

on:
  schedule:
    - cron: '*/5 * * * *' # Roda a cada 5 minutos
  workflow_dispatch:

jobs:
  atualizar-site:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Dá permissão ao robô para alterar o site
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Força o uso da versão mais nova

    steps:
      - name: Aceder aos ficheiros do site
        uses: actions/checkout@v4

      - name: Preparar o ambiente JavaScript
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Versão atualizada

      - name: Executar o script
        run: node atualizador.js

      - name: Guardar e publicar as alterações
        run: |
          git config --global user.name "Robô Caçador de Ofertas"
          git config --global user.email "actions@github.com"
          git add cupons.json index.html sitemap.xml robots.txt *.html
          git commit -m "Atualização automática de cupões e páginas" || echo "Sem alterações novas"
          git push
