<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#111111">
    <title>Caçador de Suplementos | Grupo VIP no WhatsApp</title>
    <link rel="icon" type="image/svg+xml" href="https://cacadordeofertas.com.br/icon.svg">
    <meta name="description"
        content="Entre para o nosso grupo VIP no WhatsApp e receba os melhores cupons e ofertas de suplementos antes de todo mundo!">

    <!-- Preconnect para otimizar o carregamento do Pixel -->
    <link rel="preconnect" href="https://connect.facebook.net">
    
    <!-- Facebook Pixel Code -->

            if (f.fbq) return; n = f.fbq = function () {
                n.callMethod ?

            };

    <!-- End Facebook Pixel Code -->

    <style>
        :root {
            --primary: #fff159;
            --whatsapp: #25D366;
            --whatsapp-dark: #128C7E;
            --bg-dark: #0a0a0a;
            --card-bg: rgba(25, 25, 25, 0.7);
            --text-light: #f5f5f5;
        }

        @keyframes grain {

            0%,
            100% {
                transform: translate(0, 0);
            }

            10% {
                transform: translate(-5%, -10%);
            }

            20% {
                transform: translate(-15%, 5%);
            }

            30% {
                transform: translate(7%, -25%);
            }

            40% {
                transform: translate(-5%, 25%);
            }

            50% {
                transform: translate(-15%, 10%);
            }

            60% {
                transform: translate(15%, 0%);
            }

            70% {
                transform: translate(0%, 15%);
            }

            80% {
                transform: translate(3%, 35%);
            }

            90% {
                transform: translate(-10%, 10%);
            }
        }

        html {
            overflow-x: hidden;
            width: 100%;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            margin: 0;
            padding: 0;
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            width: 100%;
            position: relative;
        }

        /* Grain texture overlay (Otimizado para Performance - Estático) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            opacity: 0.05;
            pointer-events: none;
            z-index: 1;
        }

        /* Massive Background Typography */
        .bg-text {
            position: absolute;
            font-size: clamp(80px, 20vw, 200px);
            font-weight: 900;
            color: transparent;
            -webkit-text-stroke: 1px rgba(255, 241, 89, 0.06);
            text-transform: uppercase;
            line-height: 0.8;
            letter-spacing: -2px;
            z-index: 0;
            transform: rotate(-5deg) scale(1.2);
            white-space: nowrap;
            top: 10%;
            left: -10%;
            animation: float 20s ease-in-out infinite alternate, revealBg 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            will-change: transform; /* Dica para GPU */
        }

        .bg-text-2 {
            top: auto;
            bottom: 5%;
            left: auto;
            right: -20%;
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.04);
            animation-delay: 0.5s;
        }

        @keyframes float {
            0% {
                transform: rotate(-5deg) translate(0, 0) scale(1.2);
            }

            100% {
                transform: rotate(-5deg) translate(-20px, 40px) scale(1.25);
            }
        }

        @keyframes revealBg {
            0% {
                opacity: 0;
                transform: rotate(-5deg) translateY(50px) scale(1.1);
            }

            100% {
                opacity: 1;
                transform: rotate(-5deg) translateY(0) scale(1.2);
            }
        }

        /* Glass/Layered Container */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 480px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            /* Bordas arredondadas mantidas */
            padding: 40px 30px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: springUp 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards;
            opacity: 0;
            transform: translateY(40px);
        }

        @keyframes springUp {
            0% {
                opacity: 0;
                transform: translateY(60px) scale(0.95);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Logo Area */
        .logo-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: -30px;
            position: relative;
            z-index: 11;
            animation: dropIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.2) 0.3s forwards;
            opacity: 0;
        }

        .logo {
            width: 90px;
            height: 90px;
            background: var(--primary);
            border-radius: 50%;
            padding: 15px;
            box-sizing: border-box;
            box-shadow: 0 15px 35px rgba(255, 241, 89, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #1a1a1a;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        @keyframes dropIn {
            0% {
                opacity: 0;
                transform: translateY(-40px) scale(0.8);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin: 40px 0 15px;
            text-align: center;
            line-height: 1.1;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .highlight {
            color: var(--primary);
            -webkit-text-fill-color: var(--primary);
        }

        p.subtitle {
            text-align: center;
            color: #aaa;
            font-size: 1.05rem;
            line-height: 1.4;
            margin-bottom: 35px;
            font-weight: 500;
        }

        .benefits {
            list-style: none;
            padding: 0;
            margin: 0 0 35px 0;
        }

        .benefits li {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            margin-bottom: 20px;
            font-size: 1.05rem;
            color: #ddd;
            font-weight: 500;
            opacity: 0;
            transform: translateX(-20px);
            animation: slideInRight 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .benefits li:nth-child(1) {
            animation-delay: 0.6s;
        }

        .benefits li:nth-child(2) {
            animation-delay: 0.75s;
        }

        .benefits li:nth-child(3) {
            animation-delay: 0.9s;
        }

        @keyframes slideInRight {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .icon-box {
            background: rgba(255, 241, 89, 0.1);
            color: var(--primary);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            /* Bordas arredondadas mantidas */
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .icon-box svg {
            width: 14px;
            height: 14px;
            stroke-width: 3;
        }

        /* Action Area */
        .btn-whatsapp {
            background: var(--whatsapp);
            color: white;
            text-decoration: none;
            padding: 20px;
            border-radius: 20px;
            /* Bordas arredondadas extremas */
            font-size: 1.15rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.25), inset 0 2px 0 rgba(255, 255, 255, 0.2);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0;
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) 1.1s forwards;
            position: relative;
            overflow: hidden;
        }

        .btn-whatsapp::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transform: skewX(-20deg) translateX(-300%);
            animation: shine 4s infinite 2s;
        }

        @keyframes shine {
            0% {
                transform: skewX(-20deg) translateX(-300%);
            }

            20%,
            100% {
                transform: skewX(-20deg) translateX(300%);
            }
        }

        .btn-whatsapp:hover,
        .btn-whatsapp:active {
            transform: scale(0.96) translateY(2px);
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.4);
            background: var(--whatsapp-dark);
        }

        .btn-whatsapp svg {
            fill: white;
            width: 26px;
            height: 26px;
            animation: wiggle 2s ease-in-out infinite 2s;
        }

        @keyframes wiggle {

            0%,
            100% {
                transform: rotate(0deg);
            }

            25% {
                transform: rotate(-10deg);
            }

            50% {
                transform: rotate(10deg);
            }

            75% {
                transform: rotate(-10deg);
            }
        }

        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }

            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .social-proof {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #888;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 600;
            opacity: 0;
            animation: fadeIn 1s ease forwards 1.4s;
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            background-color: var(--primary);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px rgba(255, 241, 89, 0.5);
            animation: pulse-dot 1.5s infinite;
        }

        @keyframes pulse-dot {
            0% {
                transform: scale(0.95);
                opacity: 0.8;
            }

            70% {
                transform: scale(1.3);
                opacity: 0;
            }

            100% {
                transform: scale(0.95);
                opacity: 0;
            }
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @media (max-width: 380px) {
            h1 {
                font-size: 1.7rem;
            }

            .card {
                padding: 30px 20px;
            }

            .btn-whatsapp {
                font-size: 1.05rem;
                padding: 18px;
            }
        }
    </style>
</head>

<body>

    <!-- Massive background typography (Z-depth) -->
    <div class="bg-text">CAÇADOR DE SUPLEMENTOS</div>
    <div class="bg-text bg-text-2">WHEY CREATINA</div>

    <main class="container">

        <div class="logo-wrap">
            <div class="logo">
                <img src="icon.svg" alt="Ícone Caçador de Suplementos" width="60" height="60" loading="eager">

                        </svg>
                    </div>
                    <span>Grupo silencioso (só enviamos ofertas)</span>
                </li>
            </ul>

            <a href="SEU_LINK_DO_GRUPO_AQUI" class="btn-whatsapp" id="btnJoinGroup">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.82 9.82 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z" />
                </svg>
                Quero Entrar no Grupo
            </a>

            <div class="social-proof">
                <span class="pulse-dot"></span>
                Vagas limitadas no grupo atual
            </div>
        </div>
    </main>

    <!-- Facebook Pixel Event Triggering -->
    <script>
        document.getElementById('btnJoinGroup').addEventListener('click', function () {
            if (typeof fbq === 'function') {
                fbq('track', 'Lead');
            }
        });
    </script>
</body>

</html>
